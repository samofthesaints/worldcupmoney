  <text x="1204" y="382" fill="#E8501F" class="mono" font-size="18" font-weight="500" text-anchor="end">48%</text>
  <text x="1204" y="397" fill="#6B6B73" class="mono" font-size="10" text-anchor="end">48¢</text>
  <rect x="780" y="412" width="104" height="20" rx="10" fill="#3A1E14"/>
  <text x="832" y="426" fill="#E8501F" font-size="10" text-anchor="middle">⚖ Balanced price</text>

  <text x="760" y="476" fill="#6B6B73" font-size="11">Built from live Polymarket data · World Cup matches only · places no bets</text>
