  <!-- item 2 -->
  <rect x="760" y="260" width="464" height="84" rx="10" fill="#1C1C1F" stroke="#26262A"/>
  <text x="780" y="286" fill="#6B6B73" class="mono" font-size="10">#2</text>
  <text x="802" y="286" class="pri" font-size="13" font-weight="500">Brazil vs Haiti</text>
  <text x="780" y="302" class="sec mono" font-size="11">Brazil — Moneyline</text>
  <text x="1204" y="286" fill="#E8501F" class="mono" font-size="18" font-weight="500" text-anchor="end">79%</text>
  <text x="1204" y="301" fill="#6B6B73" class="mono" font-size="10" text-anchor="end">79¢</text>
  <rect x="780" y="316" width="98" height="20" rx="10" fill="#3A1E14"/>
