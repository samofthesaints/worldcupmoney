  <text x="392" y="35" class="sec" font-size="13">Portfolio</text>
  <text x="470" y="35" class="sec" font-size="13">Planner</text>
  <rect x="1024" y="16" width="140" height="26" rx="13" fill="#1C1C1F" stroke="#26262A"/>
  <circle cx="1044" cy="29" r="3.5" fill="#22C55E"/>
  <text x="1056" y="33" class="sec" font-size="11">Live · 30s</text>
  <rect x="1176" y="16" width="72" height="26" rx="13" fill="#1C1C1F" stroke="#26262A"/>
  <text x="1212" y="33" class="mono pri" font-size="12" font-weight="500" text-anchor="middle">$45.71</text>

  <!-- LEFT: light feature card -->
  <rect x="32" y="80" width="288" height="288" rx="16" fill="#E8EAE3"/>
