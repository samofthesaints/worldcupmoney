  <text x="56" y="156" class="mono" font-size="40" font-weight="500" fill="#0A0A0B">$45.71</text>
  <rect x="56" y="172" width="84" height="22" rx="11" fill="#dcfce7"/>
  <text x="98" y="187" class="mono" font-size="11" font-weight="500" fill="#15803d" text-anchor="middle">+$25.71</text>
  <g fill="#0A0A0B">
    <rect x="56" y="300" width="26" height="40" rx="2"/>
    <rect x="90" y="278" width="26" height="62" rx="2"/>
    <rect x="124" y="290" width="26" height="50" rx="2"/>
    <rect x="158" y="252" width="26" height="88" rx="2"/>
    <rect x="192" y="270" width="26" height="70" rx="2"/>
