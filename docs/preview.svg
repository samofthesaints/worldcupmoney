    <text x="696" y="254" fill="#6B6B73" font-size="9" text-anchor="end">Morocco</text>
    <line x1="360" y1="266" x2="696" y2="266" stroke="#26262A"/>
    <!-- row 4 -->
    <text x="378" y="287" class="pri" font-family="Inter" font-size="13" font-weight="500">Brazil vs Haiti</text>
    <text x="378" y="301" fill="#6B6B73" font-size="10">Today 21:00</text>
    <text x="696" y="289" fill="#22C55E" font-size="13" font-weight="500" text-anchor="end">79%</text>
    <text x="696" y="302" fill="#6B6B73" font-size="9" text-anchor="end">Brazil</text>
