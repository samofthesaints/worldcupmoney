<svg width="1280" height="540" viewBox="0 0 1280 540" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <style>
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace}
    .lbl{fill:#6B6B73;font-size:10px;letter-spacing:1.4px}
    .sec{fill:#A1A1AA}.pri{fill:#F5F5F4}
  </style>
  <rect width="1280" height="540" fill="#0A0A0B"/>

  <!-- header -->
  <line x1="0" y1="56" x2="1280" y2="56" stroke="#26262A"/>
